{% load static %}

                <img src="{% static 'assets/images/brand/logo-2.png' %}" class="header-brand-img light-logo" alt="logo">

                    <li class="slide">
                        <a class="side-menu__item has-link" data-bs-toggle="slide" href="{% url 'app:courses' %}">
